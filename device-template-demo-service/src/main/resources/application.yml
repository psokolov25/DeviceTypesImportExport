micronaut:
  application:
    name: device-template-demo-service
  server:
    port: 8080
    netty:
      compression-threshold: -1
  router:
    static-resources:
      swagger:
        mapping: /swagger/**
        paths: classpath:META-INF/swagger
      swagger-ui:
        mapping: /swagger-ui/**
        paths: classpath:META-INF/swagger/views/swagger-ui

logger:
  levels:
    root: INFO


dtt:
  # PNG-иконка типа устройства по умолчанию (Base64).
  defaultDTTIcon: ""
