components:
  schemas:
    BranchDeviceType:
      type: "object"
      properties:
        template:
          $ref: "#/components/schemas/DeviceTypeTemplate"
        devices:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/DeviceInstanceTemplate"
        kind:
          type: "string"
        onStartEvent:
          $ref: "#/components/schemas/BranchScript"
        onStopEvent:
          $ref: "#/components/schemas/BranchScript"
        onPublicStartEvent:
          $ref: "#/components/schemas/BranchScript"
        onPublicFinishEvent:
          $ref: "#/components/schemas/BranchScript"
        deviceTypeFunctions:
          type: "string"
        eventHandlers:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/BranchScript"
        commands:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/BranchScript"
    BranchDeviceTypeMetadata:
      required:
      - "description"
      - "deviceTypeId"
      - "imageBase64"
      - "name"
      - "version"
      type: "object"
      properties:
        deviceTypeId:
          type: "string"
        name:
          type: "string"
        version:
          type: "string"
        description:
          type: "string"
        imageBase64:
          type: "string"
    BranchEquipment:
      required:
      - "branches"
      - "metadata"
      type: "object"
      properties:
        branches:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/BranchNode"
        metadata:
          type: "array"
          items:
            $ref: "#/components/schemas/BranchDeviceTypeMetadata"
      description: "Модель branch equipment JSON"
    BranchNode:
      required:
      - "deviceTypes"
      - "displayName"
      - "id"
      type: "object"
      properties:
        id:
          type: "string"
        displayName:
          type: "string"
        deviceTypes:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/BranchDeviceType"
    BranchPreviewDetailedResponse:
      type: "object"
      properties:
        branchJson:
          type: "array"
          description: "Preview branch equipment JSON как объект"
          items:
            type: "object"
        computationsByTarget:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/PreviewComputationEntry"
          description: "Сводка defaults/overrides по ключу branchId:deviceTypeId"
      description: "Детальный preview branch equipment JSON с расчётом defaults/overrides"
    BranchScript:
      required:
      - "inputParameters"
      - "outputParameters"
      - "scriptCode"
      type: "object"
      properties:
        inputParameters:
          type: "object"
          additionalProperties: true
        outputParameters:
          type: "array"
          items:
            type: "object"
        scriptCode:
          type: "string"
    DemoErrorResponse:
      type: "object"
      properties:
        code:
          type: "string"
          example: "BAD_REQUEST"
        message:
          type: "string"
          example: "archivesBase64 must contain at least one DTT archive"
      description: "Структурированная ошибка demo API"
    DeviceInstanceTemplate:
      required:
      - "description"
      - "deviceParamValues"
      - "displayName"
      - "id"
      - "name"
      type: "object"
      properties:
        id:
          type: "string"
        name:
          type: "string"
        displayName:
          type: "string"
        description:
          type: "string"
        deviceParamValues:
          type: "object"
          additionalProperties: true
    DeviceTypeBasicMetadataResponse:
      type: "object"
      properties:
        id:
          type: "string"
          description: "Идентификатор типа устройства"
          example: "display"
        name:
          type: "string"
          description: "Название типа устройства"
          example: "Display"
        version:
          type: "string"
          description: "Версия типа устройства"
          example: "1.0.0"
        description:
          type: "string"
          description: "Описание типа устройства"
          example: "Экран электронной очереди"
        imageBase64:
          type: "string"
          description: "PNG-иконка в Base64"
      description: "Базовые метаданные типа устройства"
    DeviceTypeMetadata:
      required:
      - "description"
      - "displayName"
      - "iconBase64"
      - "id"
      - "name"
      - "version"
      type: "object"
      properties:
        id:
          type: "string"
        name:
          type: "string"
        displayName:
          type: "string"
        description:
          type: "string"
        version:
          type: "string"
        iconBase64:
          type: "string"
    DeviceTypeTemplate:
      required:
      - "deviceTypeParamValues"
      - "metadata"
      type: "object"
      properties:
        metadata:
          $ref: "#/components/schemas/DeviceTypeMetadata"
        deviceTypeParamValues:
          type: "object"
          additionalProperties: true
    DttInspectionResponse:
      required:
      - "commandsCount"
      - "deviceTypeDescription"
      - "deviceTypeId"
      - "deviceTypeName"
      - "deviceTypeVersion"
      - "eventHandlersCount"
      - "formatName"
      - "formatVersion"
      - "imageBase64"
      type: "object"
      properties:
        formatName:
          type: "string"
        formatVersion:
          type: "string"
        deviceTypeId:
          type: "string"
        deviceTypeName:
          type: "string"
        deviceTypeVersion:
          type: "string"
        deviceTypeDescription:
          type: "string"
        imageBase64:
          type: "string"
        eventHandlersCount:
          type: "integer"
          format: "int32"
        commandsCount:
          type: "integer"
          format: "int32"
      description: "Краткая информация о DTT-архиве"
    DttMetadataBatchResponse:
      type: "object"
      properties:
        metadata:
          type: "array"
          description: "Список базовых метаданных типов устройств"
          items:
            $ref: "#/components/schemas/DeviceTypeBasicMetadataResponse"
      description: "Список базовых метаданных типов устройств из DTT/DTT-set"
    DttValidationIssueResponse:
      type: "object"
      properties:
        code:
          type: "string"
          example: "GROOVY_SYNTAX_ERROR"
        path:
          type: "string"
          example: "scripts/onStartEvent.groovy"
        message:
          type: "string"
          example: "Groovy-скрипт не компилируется"
      description: "Диагностическая проблема валидации DTT"
    DttValidationResponse:
      required:
      - "issues"
      type: "object"
      properties:
        valid:
          type: "boolean"
          example: true
        issues:
          type: "array"
          items:
            $ref: "#/components/schemas/DttValidationIssueResponse"
      description: "Результат валидации DTT"
    DttVersionComparisonResponse:
      type: "object"
      properties:
        inputVersion:
          type: "string"
          description: "Введённая версия"
          example: "2.1.0"
        dttVersion:
          type: "string"
          description: "Версия из DTT"
          example: "2.0.5"
        greaterVersion:
          type: "string"
          description: "Большая версия"
          example: "2.1.0"
        greaterSource:
          type: "string"
          description: "Источник большей версии: INPUT, DTT или EQUAL"
          example: "INPUT"
      description: "Результат сравнения версии из DTT и версии из параметра"
    EquipmentProfile:
      required:
      - "deviceTypes"
      type: "object"
      properties:
        deviceTypes:
          type: "object"
          additionalProperties:
            $ref: "#/components/schemas/DeviceTypeTemplate"
      description: "Модель profile JSON"
    ExportAllDttFromBranchRequest:
      type: "object"
      properties:
        branchEquipment:
          description: "Модель branch equipment JSON"
          allOf:
          - $ref: "#/components/schemas/BranchEquipment"
        branchJson:
          type: "object"
          description: "Branch equipment JSON как объект (альтернативно branchEquipment)"
          additionalProperties: true
        branchIds:
          type: "array"
          description: "Опциональный список branchId для выборочного экспорта"
          example:
          - "branch-1"
          - "branch-2"
          items:
            type: "string"
        deviceTypeIds:
          type: "array"
          description: "Опциональный список deviceTypeId для выборочного экспорта"
          example:
          - "display"
          items:
            type: "string"
        mergeStrategy:
          description: "Стратегия merge при повторении deviceTypeId"
          example: "FAIL_IF_EXISTS"
          allOf:
          - $ref: "#/components/schemas/MergeStrategy"
        dttVersion:
          type: "string"
          description: "Версия DTT, которая фиксируется в архиве"
          example: "2.1.0"
      description: "Запрос на экспорт набора DTT из branch equipment JSON"
    ExportAllDttFromBranchResponse:
